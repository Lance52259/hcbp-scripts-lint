name: CLI Upgrade Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  cli-upgrade-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run CLI upgrade unit tests
        run: python3 acceptances/good/cli_upgrade/test_cli_upgrade.py -v

      - name: Run CLI upgrade integration tests
        run: python3 acceptances/good/cli_upgrade/integration/test_upgrade_integration.py -v

      - name: Run CLI help tests
        run: python3 acceptances/good/cli_help/test_cli_help.py -v
